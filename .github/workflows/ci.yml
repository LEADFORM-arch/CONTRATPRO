name: ContratPro CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: contratpro-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  production-gate:
    name: Production gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare audit environment
        run: |
          cat > .env.local <<'EOF'
          NEXT_PUBLIC_APP_URL=http://localhost:3000
          CONTRATPRO_APP_URL=http://localhost:3000
          CONTRATPRO_REQUIRE_AUTH=true
          CONTRATPRO_RLS_ENABLED=true
          CONTRATPRO_REQUIRE_BILLING=false
          CONTRATPRO_ADMIN_EMAILS=esport.hub.pro@proton.me
          CONTRATPRO_NOTIFICATION_EMAILS=esport.hub.pro@proton.me
          SUPABASE_URL=https://example.supabase.co
          SUPABASE_ANON_KEY=ci_supabase_anon_key
          SUPABASE_SERVICE_ROLE_KEY=ci_supabase_service_role_key
          NEXT_PUBLIC_SUPABASE_URL=https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=ci_supabase_anon_key
          RESEND_API_KEY=ci_resend_key
          RESEND_FROM_EMAIL=ContratPro <documents@example.fr>
          GOCARDLESS_ACCESS_TOKEN=ci_gocardless_token
          GOCARDLESS_ENVIRONMENT=sandbox
          GOCARDLESS_WEBHOOK_ENDPOINT_SECRET=ci_gocardless_webhook_secret
          STRIPE_SECRET_KEY=sk_test_ci
          STRIPE_WEBHOOK_SECRET=whsec_ci
          STRIPE_PRICE_ID=price_ci
          CRON_SECRET=ci_cron_secret
          CONTRATPRO_CRON_SECRET=ci_cron_secret
          EOF

      - name: TypeScript
        run: npm run type-check

      - name: Quality regressions
        run: npm run test:quality

      - name: Security audit
        run: npm run security:audit

      - name: Production readiness audit
        run: npm run production:audit

      - name: Vercel deployment preflight
        run: npm run deploy:preflight

      - name: Build
        run: npm run build
